<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('admin_login') }}" class="nav-link">Admin Login</a>
            <a href="{{ url_for('user_login') }}" class="nav-link active">User Login</a>
        </div>
        <div class="nav-right">
            <a href="{{ url_for('home') }}" class="nav-link">Home</a>
            <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="login-box">
            <h2>User Login</h2>
            <p>Enter your credentials to access the survey system</p>
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <p class="help-text">Contact your administrator if you need login credentials</p>
        </div>
    </div>
</body>
</html>
